<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamify Life</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gamify Life</h1>
            <p>🎮</p>
        </header>
        
        <!-- ===== THANH ĐIỀU HƯỚNG TABS ===== -->
        <nav class="app-nav">
            <button class="nav-btn" data-target="tab-profile">👤 Hồ sơ</button>
            <button class="nav-btn active" data-target="tab-quests">📜 Nhiệm vụ</button>
            <button class="nav-btn" data-target="tab-achievements">🏆 Thành tựu</button>
        </nav>

        <main class="dashboard-layout">
            
            <!-- 👤 TAB 1: HỒ SƠ -->
            <aside class="col-left tab-content" id="tab-profile">
                <div id="stats">Đang tải...</div>
                
                <div id="radar-container">
                    <div class="radar-title">📊 Chỉ số cơ bản</div>
                </div>
                
                <div id="stats-container"></div>
            </aside>
            
            <!-- 📜 TAB 2: NHIỆM VỤ (Mặc định mở) -->
            <section class="col-center tab-content active" id="tab-quests">
                
                <!-- Khu vực 1: Card Tạo Nhiệm Vụ -->
                <div class="quest-creation-card">
                    <h2>➕ Phân Công Nhiệm Vụ</h2>
                    <form id="quest-form">
                        <input type="text" id="quest-title" placeholder="Bạn muốn hoàn thành việc gì hôm nay?..." required>
                        
                        <div class="quest-form-row">
                            <select id="quest-type" title="Loại nhiệm vụ">
                                <option value="adhoc" selected>🎯 Một lần (Ad-hoc)</option>
                                <option value="daily">🔁 Hàng ngày (Daily)</option>
                            </select>
                            <select id="quest-difficulty" title="Độ khó">
                                <option value="easy">Dễ (x1)</option>
                                <option value="medium" selected>Vừa (x2)</option>
                                <option value="hard">Khó (x3)</option>
                            </select>
                        </div>

                        <div class="stat-toggles-container">
                            <div class="stat-toggles-label">Chọn hệ năng lực (Có thể chọn nhiều):</div>
                            <div class="stat-toggles" id="quest-stat-toggles">
                                <label class="stat-toggle"><input type="checkbox" value="str" checked> <span>⚔️ STR</span></label>
                                <label class="stat-toggle"><input type="checkbox" value="agi"> <span>🪽 AGI</span></label>
                                <label class="stat-toggle"><input type="checkbox" value="int"> <span>🧠 INT</span></label>
                                <label class="stat-toggle"><input type="checkbox" value="vit"> <span>❤️ VIT</span></label>
                                <label class="stat-toggle"><input type="checkbox" value="lck"> <span>🍀 LCK</span></label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-create-quest">🚀 Tạo Nhiệm Vụ</button>
                    </form>
                </div>

                <!-- Khu vực 2: Danh sách Nhiệm Vụ -->
                <div class="quest-board-card">
                    <h2>📜 Bảng Nhiệm Vụ</h2>
                    <ul id="quest-list"></ul>
                </div>
            </section>

            <!-- 🏆 TAB 3: THÀNH TỰU -->
            <aside class="col-right tab-content" id="tab-achievements">
                <div id="gamification-section">
                    <div id="streak-display">🔥 Streak: <span id="streak-value">0</span> ngày</div>
                    <div id="title-display">🎖 <span id="user-title">Tập Sự</span></div>
                    
                    <h3 class="badges-title">Thành tựu</h3>
                    <div id="badges-container"></div>
                </div>
            </aside>
            
        </main>
    </div>
    
    <!-- Toast & Level Up Overlay -->
    <div id="toast-container"></div>
    <div id="levelup-overlay" class="hidden">
        <div class="levelup-modal">
            <h2 class="levelup-title">🎉 LEVEL UP!</h2>
            <p class="levelup-level">Level <span id="levelup-new-level"></span></p>
            <p class="levelup-title-text" id="levelup-title-text"></p>
            <button id="close-levelup">Đóng</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/quest.js"></script>
    <script src="js/reward.js"></script>
    <script src="js/chart.js"></script> 
    <script src="js/main.js"></script>
</body>
</html>
